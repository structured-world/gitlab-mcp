# Release Please — accumulative release PR workflow
#
# On every push to main:
#   1. Creates/updates a release PR with version bump + CHANGELOG
#   2. When the release PR is merged → creates GitHub release + tag
#   3. Post-release: runs prepare-release.sh, publishes npm, Docker, MCPB, MCP Registry

name: Release

permissions:
  contents: read

on:
  push:
    branches:
      - main

env:
  GHCR_REGISTRY: ghcr.io
  IMAGE_NAME: structured-world/gitlab-mcp

jobs:
  # Job 1: Release Please — create/update release PR or create release
  release-please:
    name: Release Please
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    outputs:
      release-created: ${{ steps.release.outputs.release_created }}
      release-version: ${{ steps.release.outputs.version }}
      release-tag: ${{ steps.release.outputs.tag_name }}
      release-sha: ${{ steps.release.outputs.sha }}
      pr-number: ${{ steps.release.outputs.pr != '' && fromJSON(steps.release.outputs.pr).number || '' }}
      pr-branch: ${{ steps.release.outputs.pr != '' && fromJSON(steps.release.outputs.pr).headBranchName || '' }}

    steps:
      - name: Generate release token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}

  # Job 2: Post-release — update artifacts, publish everywhere
  post-release:
    name: Post-Release Publish
    runs-on: ubuntu-latest
    needs: release-please
    environment: release  # Required for npm OIDC trusted publishing
    # Note: GitHub Actions supports hyphens in job IDs and output names with dot notation.
    # Bracket notation (needs['release-please']) is NOT required here.
    if: needs.release-please.outputs.release-created == 'true'

    permissions:
      contents: write
      packages: write
      id-token: write  # npm provenance + MCP Registry OIDC

    steps:
      - name: Generate release token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.release-tag }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          # NO registry-url — it creates .npmrc with NODE_AUTH_TOKEN placeholder
          # which overrides OIDC trusted publishing with an invalid token

      - name: Enable Corepack
        run: corepack enable

      - name: Install Yarn
        run: corepack prepare yarn@4.12.0 --activate

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build all packages
        run: yarn build

      # Update dynamic artifacts (tool counts in server.json, README.md, package.json manifest)
      - name: Run prepare-release script
        run: ./scripts/prepare-release.sh "${{ needs.release-please.outputs.release-version }}"
        working-directory: packages/gitlab-mcp

      # Note: server.json version is updated by release-please extra-files.
      # Dynamic counts (README.md, package.json manifest) are updated by prepare-release.sh
      # locally for the build but NOT committed back — they'll be current in the next release PR.

      # Publish to npm via OIDC trusted publishing (no static token needed).
      # Auth: npm trusted publishing via OIDC (id-token: write + environment: release)
      # Configure at npmjs.com → Package Settings → Publishing Access → Trusted Publishers:
      #   Organization: structured-world, Repository: gitlab-mcp
      #   Workflow: release-please.yml, Environment: release
      # Uses npm CLI (not yarn npm) — Yarn 4 doesn't support OIDC provenance.
      - name: Publish core to npm
        working-directory: packages/gitlab-mcp
        run: |
          VERSION="$(jq -r .version package.json)"
          if npm view "@structured-world/gitlab-mcp@${VERSION}" version >/dev/null 2>&1; then
            echo "Core ${VERSION} already published to npm; skipping."
            exit 0
          fi
          npm publish --provenance --access public

      - name: Publish db package to npm
        working-directory: packages/gitlab-mcp-db
        run: |
          VERSION="$(jq -r .version package.json)"
          if npm view "@structured-world/gitlab-mcp-db@${VERSION}" version >/dev/null 2>&1; then
            echo "Db ${VERSION} already published to npm; skipping."
            exit 0
          fi
          # Resolve any Yarn workspace: specifier to the real (lockstep) version.
          # Plain `npm publish` (used for OIDC provenance) does not understand the
          # workspace: protocol, so it would otherwise ship an invalid range.
          jq --arg v "^${VERSION}" '
            def resolve_ws:
              if . then with_entries(
                if (.value | type == "string") and (.value | startswith("workspace:"))
                then .value = $v else . end) else . end;
            .dependencies |= resolve_ws
            | .devDependencies |= resolve_ws
            | .peerDependencies |= resolve_ws
          ' package.json > package.json.tmp && mv package.json.tmp package.json
          npm publish --provenance --access public

      # Build and upload both MCPB bundles (lightweight core + full with db)
      - name: Build MCPB bundles
        working-directory: packages/gitlab-mcp
        run: |
          VERSION="$(jq -r .version package.json)"
          ./scripts/build-mcpb.sh "$VERSION"
          MCPB_WITH_DB=true ./scripts/build-mcpb.sh "$VERSION"

      - name: Upload MCPB bundles to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.release-tag }}
          files: |
            packages/gitlab-mcp/gitlab-mcp-*.mcpb
            packages/gitlab-mcp/gitlab-mcp-db-*.mcpb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish Docker images
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Per-package versions (monorepo versions are independent).
      - name: Read package versions
        id: versions
        run: |
          echo "core=$(jq -r .version packages/gitlab-mcp/package.json)" >> "$GITHUB_OUTPUT"
          echo "db=$(jq -r .version packages/gitlab-mcp-db/package.json)" >> "$GITHUB_OUTPUT"

      - name: Extract core Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.versions.outputs.core }}
            type=raw,value=latest
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.versions.outputs.core }}
            type=semver,pattern={{major}},value=${{ steps.versions.outputs.core }}

      - name: Build and push core Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./packages/gitlab-mcp/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.versions.outputs.core }}

      - name: Extract db Docker metadata
        id: meta-db
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}-db
          tags: |
            type=raw,value=${{ steps.versions.outputs.db }}
            type=raw,value=latest
            type=semver,pattern={{major}}.{{minor}},value=${{ steps.versions.outputs.db }}
            type=semver,pattern={{major}},value=${{ steps.versions.outputs.db }}

      # Layered on the core image just pushed; reuses its cached layers.
      - name: Build and push db Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./packages/gitlab-mcp-db/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta-db.outputs.tags }}
          labels: ${{ steps.meta-db.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CORE_IMAGE=${{ env.GHCR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.versions.outputs.core }}

      # Publish to MCP Registry
      - name: Install mcp-publisher
        # Pinned to specific version. SHA256 verification not possible — upstream
        # (modelcontextprotocol/registry) does not publish checksums for binary releases.
        # HTTPS + pinned version is the current trust model. Update MCP_PUBLISHER_VERSION when upgrading.
        env:
          MCP_PUBLISHER_VERSION: v1.7.9
        run: |
          curl -fL -o mcp-publisher.tar.gz "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
          tar xzf mcp-publisher.tar.gz mcp-publisher
          test -x ./mcp-publisher || { echo "Error: mcp-publisher not found after extraction"; exit 1; }
          rm -f mcp-publisher.tar.gz

      # MCPB file is already on disk from "Build MCPB bundle" step above.
      # Note: .packages append is safe for reruns — server.json is checked out
      # fresh from the release tag each time, so no duplicate entries accumulate.
      - name: Add MCPB entry to server.json
        working-directory: packages/gitlab-mcp
        run: |
          VERSION="$(jq -r .version package.json)"
          MCPB_FILE="gitlab-mcp-${VERSION}.mcpb"
          MCPB_URL="https://github.com/${{ github.repository }}/releases/download/${{ needs.release-please.outputs.release-tag }}/${MCPB_FILE}"
          SHA256=$(openssl dgst -sha256 "${MCPB_FILE}" | awk '{print $NF}')
          echo "MCPB SHA256: ${SHA256}"

          jq --arg url "$MCPB_URL" --arg sha "$SHA256" \
            '.packages += [{"registryType": "mcpb", "identifier": $url, "fileSha256": $sha, "transport": {"type": "stdio"}}]' \
            server.json > server.tmp
          jq . server.tmp > /dev/null || { echo "Error: invalid JSON produced by jq"; exit 1; }
          mv server.tmp server.json

          echo "Final server.json:"
          cat server.json

      # mcp-publisher reads server.json from the working directory; the binary
      # was extracted to the workspace root.
      - name: Authenticate to MCP Registry (OIDC)
        working-directory: packages/gitlab-mcp
        run: $GITHUB_WORKSPACE/mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        working-directory: packages/gitlab-mcp
        run: $GITHUB_WORKSPACE/mcp-publisher publish

  # Job 3: Sync generated metadata into the open release PR
  # When release-please updates (not merges) the release PR, regenerate the
  # dynamic artifacts (package.json MCP manifest + tool counts, README counts,
  # server.json description) and commit them onto the PR branch so the committed
  # state always matches what will be published — alongside the version bump and
  # CHANGELOG that already live on that branch.
  #
  # Loop-safe: this pushes to the release PR branch, and the workflow only triggers
  # on push to main, so the commit never re-triggers the workflow. release-please
  # may rebuild its PR branch on the next push to main; this job re-runs then and
  # re-applies the metadata, so the PR is current whenever it is merged.
  sync-release-pr:
    name: Sync generated metadata into release PR
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.pr-number != '' && needs.release-please.outputs.release-created != 'true'

    permissions:
      contents: write

    steps:
      - name: Generate release token
        uses: actions/create-github-app-token@v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASER_APP_ID }}
          private-key: ${{ secrets.RELEASER_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Checkout release PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.pr-branch }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Enable Corepack
        run: corepack enable

      - name: Install Yarn
        run: corepack prepare yarn@4.12.0 --activate

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build all packages
        run: yarn build

      # release-please already bumped package.json version on the PR branch;
      # use it so README/server.json counts carry the pending release version.
      - name: Regenerate dynamic metadata
        run: ./scripts/prepare-release.sh "$(jq -r .version package.json)"
        working-directory: packages/gitlab-mcp

      - name: Commit regenerated metadata to the release PR
        working-directory: packages/gitlab-mcp
        run: |
          git config user.name "structured-world-releaser[bot]"
          git config user.email "structured-world-releaser[bot]@users.noreply.github.com"
          # Only the committed dynamic artifacts. .semantic-release-version is a
          # release-time-only file and must not be committed.
          git add package.json README.md server.json
          if git diff --cached --quiet; then
            echo "No metadata drift; nothing to commit."
          else
            git commit -m "chore: sync generated tool metadata"
            git push origin "HEAD:${{ needs.release-please.outputs.pr-branch }}"
          fi

  # Job 4: Summary
  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    permissions: {}
    needs: [release-please, post-release]
    if: always()

    steps:
      - name: Summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.release-please.outputs.release-created }}" == "true" ]]; then
            echo "🚀 New version released: v${{ needs.release-please.outputs.release-version }}" >> $GITHUB_STEP_SUMMARY

            if [[ "${{ needs.post-release.result }}" == "success" ]]; then
              echo "✅ All publish steps completed" >> $GITHUB_STEP_SUMMARY
              echo "📦 npm: @structured-world/gitlab-mcp@${{ needs.release-please.outputs.release-version }}" >> $GITHUB_STEP_SUMMARY
              echo "🐳 Docker: ghcr.io/${{ env.IMAGE_NAME }}:${{ needs.release-please.outputs.release-version }}" >> $GITHUB_STEP_SUMMARY
              echo "📦 MCPB: gitlab-mcp-${{ needs.release-please.outputs.release-version }}.mcpb" >> $GITHUB_STEP_SUMMARY
              echo "🌐 MCP Registry: io.github.structured-world/gitlab-mcp" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ Post-release publish failed" >> $GITHUB_STEP_SUMMARY
            fi
          elif [[ -n "${{ needs.release-please.outputs.pr-number }}" ]]; then
            echo "📋 Release PR updated: #${{ needs.release-please.outputs.pr-number }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No release-worthy changes detected" >> $GITHUB_STEP_SUMMARY
          fi
