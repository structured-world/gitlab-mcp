# SonarCloud configuration
# https://sonarcloud.io/documentation/project-administration/narrowing-the-focus/

# Exclude test files from Copy-Paste Detection (CPD).
# Sonar's CPD threshold is far more sensitive than ad-hoc tools and flags the
# assertion patterns that repeat across test cases by design (expect, mock setup,
# the same CQRS browse/manage structure per entity, the same storage contract per
# backend). That is intentional test structure, not accidental duplication, so
# tests are excluded wholesale — the industry-standard treatment Sonar itself
# recommends. Real helper copy-paste (server launcher, transport clients) is
# deduplicated in code rather than hidden here.
# Leading **/ so the match holds wherever a package's tests/ dir lives in the
# monorepo (e.g. packages/gitlab-mcp/tests/), not only at the repo root.
sonar.cpd.exclusions=**/tests/**/*,**/*.test.ts
