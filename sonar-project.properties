# SonarCloud configuration
# https://sonarcloud.io/documentation/project-administration/narrowing-the-focus/

# Copy-Paste Detection (CPD) exclusions — narrow and justified, NOT a blanket
# cover for the whole test tree. Real helper copy-paste (the server launcher and
# the transport test clients) has been deduplicated in code; what is excluded
# here is only genuinely intentional shared-contract repetition:
#   - oauth/storage/*.test.ts: every backend (memory/file/...) is verified against
#     the same SessionStorageBackend contract, so the test bodies repeat by design.
#   - entities/**/registry.test.ts: each entity's CQRS registry is asserted with
#     the same browse_*/manage_* structure — repetition is the shared contract.
sonar.cpd.exclusions=**/tests/unit/oauth/storage/*.test.ts,**/tests/unit/entities/**/registry.test.ts
