# CI/CD Bot preset - automation
#
# Minimal tools for CI/CD automation:
# - Pipeline operations
# - File management
# - Variables access
#
# No access to development workflow tools.
#
# NOTE: This is a PRESET - host/auth come from environment variables.

description: "CI/CD Bot - minimal tools for automation"

read_only: false

features:
  wiki: false
  milestones: false
  pipelines: true
  labels: false
  mrs: false
  files: true
  variables: true
  workitems: false
  webhooks: false
  snippets: false
  integrations: false
  # New entities - automation focused
  releases: true    # Automated releases
  refs: false       # No branch management
  members: false    # No team management
  search: false     # No search needed for CI
  ci_tokens: true   # Job token scope + deploy keys (CI access credentials)
  # GitLab 18/19 domains - automation
  environments: true    # Deploy/stop environments
  runners: true         # Ephemeral runner registration
  registry: true        # Push/clean container images
  access_tokens: false  # Sensitive, not for the bot
  audit_events: false
  vulnerabilities: false

# Block workflow-related operations
denied_tools_regex: "^manage_(work_item|mr|label|milestone|wiki)"
