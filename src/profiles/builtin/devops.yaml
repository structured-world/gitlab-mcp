# DevOps Engineer preset - CI/CD and infrastructure
#
# Focused on infrastructure and automation:
# - Full pipeline management
# - Variables and secrets
# - Webhooks and integrations
# - File operations for configs
#
# No access to development workflow tools (MRs, issues, wiki).
#
# NOTE: This is a PRESET - host/auth come from environment variables.

description: "DevOps Engineer - CI/CD pipelines, variables, infrastructure"

read_only: false

features:
  wiki: false
  milestones: false
  pipelines: true
  labels: false
  mrs: false
  files: true
  variables: true
  workitems: false
  webhooks: true
  snippets: false
  integrations: true
  # New entities - infrastructure focused
  releases: true    # Release management
  refs: true        # Branch/tag management
  members: false    # No team management
  search: true      # Code search for debugging
  ci_tokens: true   # Job token scope + deploy keys (CI access credentials)
  # GitLab 18/19 domains - infrastructure/ops
  environments: true    # Deployment targets
  runners: true         # CI runner management
  registry: true        # Container image cleanup/audit
  access_tokens: true   # Rotate CI/automation tokens
  audit_events: false   # Compliance concern, not ops
  vulnerabilities: false  # Security team concern
